# Render blueprint for the TraxJob API (standalone Express server).
# Create the service from this file via Render → New → Blueprint, then set the
# secret env vars (marked sync:false) in the dashboard. See DEPLOY.md.
services:
  - type: web
    name: traxjob-api
    runtime: node
    plan: free
    region: singapore
    # --include=dev so tsx + drizzle-kit (devDeps) are available to run/migrate.
    # Migrations run on every deploy (drizzle-kit migrate is idempotent).
    buildCommand: npm install --include=dev && npm run db:migrate
    startCommand: npm run server:start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: CLIENT_ORIGIN
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: EMAIL_FROM
        sync: false
